services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitorps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://postgres:postgres@db:5432/monitorps?schema=public
      PORT: 3000
      SCRAPE_INTERVAL_MINUTES: 60
      HEADLESS: true
      TZ: UTC
      SAVE_RAW_HTML: false
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    command: sh -c "npm run migrate:deploy && npm run start"

volumes:
  pgdata:
