name: scrape-hourly

on:
  schedule:
    # Ejecuta el workflow cada hora en UTC (HH:00)
    - cron: "0 * * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions en GitHub
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # URL de conexión a tu base de datos PostgreSQL (Supabase/Neon). Debe declararse como secret en GitHub.
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      # URL directa para migraciones (Neon). Opcional si usás Supabase o no necesitás direct pooler.
      DIRECT_URL: ${{ secrets.DIRECT_URL || vars.DIRECT_URL }}
      # Ejecutamos Playwright en modo headless para evitar abrir la UI
      HEADLESS: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Instalamos Chromium y sus dependencias del sistema
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate database configuration
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL is empty. Configure it in GitHub Secrets or Repository Variables before running this workflow." >&2
            exit 1
          fi

          if [ -z "${DIRECT_URL}" ]; then
            echo "DIRECT_URL is not set. Prisma migrate will run using DATABASE_URL as fallback."
          fi

      - name: Run Prisma migrations
        run: |
          set -euo pipefail

          run_migrate_deploy() {
            local output_file
            output_file="$(mktemp)"

            set +e
            npx prisma migrate deploy 2>&1 | tee "${output_file}"
            local exit_code=${PIPESTATUS[0]}
            set -e

            if [ ${exit_code} -eq 0 ]; then
              rm -f "${output_file}"
              return 0
            fi

            if rg -q "Error: P3005" "${output_file}"; then
              echo "Prisma reported P3005 (existing non-empty schema). Attempting baseline resolve..."
              if [ ! -d "prisma/migrations" ]; then
                echo "Cannot baseline because prisma/migrations directory was not found." >&2
                cat "${output_file}" >&2
                rm -f "${output_file}"
                return ${exit_code}
              fi

              mapfile -t migrations < <(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

              if [ ${#migrations[@]} -eq 0 ]; then
                echo "Cannot baseline because no local migration folders were found." >&2
                cat "${output_file}" >&2
                rm -f "${output_file}"
                return ${exit_code}
              fi

              for migration in "${migrations[@]}"; do
                echo "Marking migration as already applied: ${migration}"
                npx prisma migrate resolve --applied "${migration}"
              done

              echo "Baseline completed. Retrying prisma migrate deploy..."
              rm -f "${output_file}"
              npx prisma migrate deploy
              return 0
            fi

            cat "${output_file}" >&2
            rm -f "${output_file}"
            return ${exit_code}
          }

          if [ -n "${DIRECT_URL:-}" ]; then
            echo "Trying prisma migrate deploy with DIRECT_URL first..."
            if run_migrate_deploy; then
              exit 0
            fi

            echo "DIRECT_URL failed. Retrying prisma migrate deploy using DATABASE_URL as DIRECT_URL fallback..." >&2
          fi

          export DIRECT_URL="${DATABASE_URL}"
          run_migrate_deploy

      - name: Build project
        run: npm run build

      - name: Run scraper
        # Ejecutamos el script principal que realiza el scraping una sola vez
        run: node dist/run.js
